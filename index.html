<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Onder de Oppervlakte — v6</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="aurora aurora-a"></div>
  <div class="aurora aurora-b"></div>
  <div class="noise"></div>

  <header class="topbar glass">
    <div>
      <div class="eyebrow">Serious RPG / Roleplay Game</div>
      <h1>Onder de Oppervlakte <span>v6</span></h1>
    </div>
    <div class="topbar-actions">
      <button id="saveBtn" class="ghost-btn">Opslaan</button>
      <button id="resetBtn" class="ghost-btn danger">Nieuwe campagne</button>
      <button id="musicBtn" class="ghost-btn">Ambient: uit</button>
    </div>
  </header>

  <main class="layout">
    <section class="main-panel glass">
      <div id="screen-landing" class="screen active"></div>
      <div id="screen-map" class="screen"></div>
      <div id="screen-dossier" class="screen"></div>
      <div id="screen-report" class="screen"></div>
    </section>

    <aside class="sidebar glass">
      <section class="profile-card">
        <div class="portrait-frame">
          <div id="classPortrait" class="portrait portrait-neutral"></div>
        </div>
        <div>
          <div class="eyebrow">Jouw rol</div>
          <h2 id="className">Nog niet gekozen</h2>
          <p id="classDesc">Kies jouw stijl: analyseren, verbinden of daadkrachtig optreden.</p>
        </div>
      </section>

      <section>
        <div class="section-title">Statistieken</div>
        <div id="stats"></div>
      </section>

      <section>
        <div class="section-title">Partners</div>
        <div id="partners"></div>
      </section>

      <section>
        <div class="section-title">Inventory</div>
        <div id="inventory" class="pill-list"></div>
      </section>

      <section>
        <div class="section-title">Logboek</div>
        <div id="logbook" class="logbook"></div>
      </section>
    </aside>
  </main>

  <footer class="footer">© Sanne de Vrieze 2026 — concept game “Onder de Oppervlakte”</footer>

  <script src="game.js"></script>
</body>
</html>
